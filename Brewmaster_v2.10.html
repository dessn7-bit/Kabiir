<title>Kabeer</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#F4EFE6;--bg2:#EDE6D8;--card:#FFF;--bor:#DDD0BC;--bor2:#C8B89A;
  --kahve:#2C1810;--bakir:#8B5A00;--altin:#C8860A;
  --soluk:#9B8060;--dim:#C8B09A;
  --yk:#1A4A1A;--ya:#E8F4E8;--kk:#7A1A1A;--ka:#FAECEC;
  --mk:#1A3A5A;--ma:#E8F0FA;--sk:#6A4A00;--sa:#FFF4DC;
  --golge:0 2px 8px rgba(44,24,16,.10);--golge2:0 4px 16px rgba(44,24,16,.14);
  --font-display:"Playfair Display",Georgia,serif;
  --font-body:"Lato",system-ui,sans-serif;
}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--kahve);font-family:var(--font-body);display:flex;flex-direction:column}
#ekran{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:28px}
input,select,textarea,button{font-family:inherit}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:var(--bor2);border-radius:2px}
input[type=number]::-webkit-inner-spin-button{opacity:.5}
.btn{border:none;border-radius:8px;padding:9px 16px;cursor:pointer;font-weight:600;transition:all .15s;font-size:13px}
.btn:active{transform:scale(.96);opacity:.85}
.inp{background:#fff;color:var(--kahve);border:1.5px solid var(--bor);border-radius:8px;padding:9px 12px;width:100%;font-size:13px;transition:border .15s}
.inp:focus{outline:none;border-color:var(--altin)}
.kart{background:var(--card);border:1px solid var(--bor);border-radius:12px;padding:14px;margin-bottom:10px;box-shadow:var(--golge)}
.satir{display:flex;align-items:center;gap:8px;padding:10px 12px;margin-bottom:5px;background:#fff;border-radius:10px;border:1px solid var(--bor);box-shadow:var(--golge)}
.etiket{font-size:10px;color:var(--soluk);font-weight:600;letter-spacing:.8px;text-transform:uppercase;display:block;margin-bottom:4px}
.uybox{border-radius:8px;padding:8px 12px;margin-bottom:6px;font-size:12px;font-weight:500;display:flex;align-items:center;gap:7px}
.uy-s{background:var(--sa);border:1px solid #E8C060;color:var(--sk)}
.uy-k{background:var(--ka);border:1px solid #E89090;color:var(--kk)}
.fade{animation:fd .18s ease}
@keyframes fd{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
.sb{display:flex;border-bottom:2px solid var(--bor);overflow-x:auto;scrollbar-width:none;padding:0 8px}
.sb::-webkit-scrollbar{display:none}
.sb-btn{padding:14px 16px;font-size:16px;font-weight:600;border:none;border-bottom:3px solid transparent;cursor:pointer;background:transparent;white-space:nowrap;flex-shrink:0;margin-bottom:-2px;transition:all .15s;color:var(--soluk)}
.sb-btn.ak{color:var(--bakir);border-bottom-color:var(--altin);background:rgba(200,134,10,.07)}
.iki{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.uc{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.ts{padding:8px 14px;border-bottom:1px solid var(--bor);font-size:12.5px;line-height:1.5}
.ts:last-child{border-bottom:none}
.ts.not{padding:4px 24px;font-size:11px;color:var(--soluk)}
.ts.vrg{color:var(--bakir);font-weight:600;background:var(--sa)}
.th{background:linear-gradient(135deg,#2A4A2A,#1A3A1A);padding:10px 14px;font-size:11px;font-weight:700;color:#A0E0A0}
.mb{display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:10px;font-size:13px;font-weight:600;width:100%;justify-content:center;margin-bottom:8px}
.mb.dolap{background:var(--ya);color:var(--yk);border:1px solid #A0D0A0}
.mb.oda{background:#EEF6FF;color:#1A4060;border:1px solid #90B8D8}
.mb.isitici{background:var(--ka);color:var(--kk);border:1px solid #D0A0A0}
.bd{text-align:center;padding:14px;background:var(--bg);border-radius:12px;border:1px solid var(--bor)}
.bd-e{font-size:10px;color:var(--soluk);font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
.bd-s{font-size:38px;font-weight:700;color:var(--bakir);line-height:1}
.hs{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--bor);font-size:13px}
.hs:last-child{border-bottom:none;font-weight:700;color:var(--bakir)}
.header{background:linear-gradient(160deg,#8B5010 0%,#A86820 50%,#C88030 100%);padding:16px;box-shadow:0 3px 12px rgba(30,12,0,.20)}
.eh{background:linear-gradient(135deg,#8B5010,#A87030);padding:10px 12px;position:sticky;top:0;z-index:100;box-shadow:0 3px 12px rgba(10,4,0,.35);border-bottom:1px solid rgba(180,120,40,.25)}
.serit{margin-top:8px;padding:10px 12px;background:var(--bg2);border-radius:10px;border:1px solid var(--bor);display:flex;gap:14px;flex-wrap:wrap;align-items:center}
.tk-k{background:#fff;border:1px solid var(--bor);border-top:none;margin:0 8px;border-radius:0 0 12px 12px;padding:14px}
.pill{font-size:10px;background:var(--sa);color:var(--sk);border-radius:4px;padding:1px 7px;font-weight:600;border:1px solid #E0C060;display:inline-block}
.mineral-satir{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.ppm-box{background:var(--bg2);border-radius:8px;padding:8px 10px;text-align:center;border:1px solid var(--bor);min-width:60px}
.ppm-etiket{font-size:9px;color:var(--soluk);font-weight:700}
.ppm-deger{font-size:15px;font-weight:700;color:var(--bakir)}
/* Su profili renk göstergeleri */
.iyi{color:#1A5A1A;font-weight:600}
.orta{color:#5A4A00;font-weight:600}
.fazla{color:#7A1A1A;font-weight:600}
</style>
</head>

    if(s.includes('kentucky common')||s.includes('steinbier')) return [2.2,2.5,2.7];
    if(s.includes('australian')) return [2.4,2.6,2.8];
  }
  // Maya tipine gore fallback
  if(mayaTip==='wheat'||mayaTip==='wit') return [3.2,3.7,4.2];
  if(mayaTip==='lager') return [2.4,2.6,2.8];
  if(mayaTip==='belcika') return [2.8,3.0,3.5];
  if(mayaTip==='saison') return [2.5,3.0,3.5];

  if(mayaTip==='sour') return [2.5,3.0,3.5];
  return [2.0,2.4,2.7]; // genel ale
}

function prim(hdf,sc,hacim){
  // Keeler denklemi — Fahrenheit gerekiyor
  const tf=sc*1.8+32;
  const residual=3.0378-0.050062*tf+0.00026555*tf*tf;
  return Math.max(0,hacim*(hdf-residual)*4.0);
}

// Su profili hesabı — her mineral için hacime göre ppm
function suProfiliHesapla(mineraller, hacim){
  const ppm={Ca:0,Mg:0,Na:0,Cl:0,SO4:0,HCO3:0};
  mineraller.forEach(m=>{
    const min=MINERALLER.find(x=>x.id===m.id);
    if(!min)return;
    // Laktik asit mL cinsinden girilir ama etki tablosu g/galon bazlı
    // Laktik asit yoğunluğu ~1.2 g/mL (%88 çözelti) 
    const isLaktik=m.id==="laktik";
    const miktarG=isLaktik?m.miktar*1.2:m.miktar; // mL→g dönüşümü
    const carpan=miktarG/(hacim*0.264172); // g/galon
    ppm.Ca+=min.etki[0]*carpan;
    ppm.Mg+=min.etki[1]*carpan;
    ppm.Na+=min.etki[2]*carpan;
    ppm.Cl+=min.etki[3]*carpan;
    ppm.SO4+=min.etki[4]*carpan;
    ppm.HCO3+=min.etki[5]*carpan;
  });
  // Negatif olmaz (alkalinite sıfırın altına düşemez pratik olarak)
  ppm.Ca=Math.max(0,ppm.Ca);
  ppm.Mg=Math.max(0,ppm.Mg);
  ppm.Na=Math.max(0,ppm.Na);
  ppm.Cl=Math.max(0,ppm.Cl);
  ppm.SO4=Math.max(0,ppm.SO4);
  // HCO3 negatif olabilir (laktik asit pH'ı düşürür) — gösterimde bilgi verelim
  return ppm;
}

function stoktenDus(tarif){
  // Stokta malzemeyi isim veya ID ile bul
  function malBul(id,ad){
    const idL=(id||'').toLowerCase();
    const adL=(ad||'').toLowerCase();
    return STOK.findIndex(s=>{
      const sL=(s.ad||'').toLowerCase();
      return sL===adL||sL.includes(adL)||adL.includes(sL)||
             sL===idL||sL.replace(/\s+/g,'_')===idL;
    });
  }
  // Birim dönüşümlü düşme
  function dustur(idx,miktar,rb){
    if(idx<0)return false;
    const s=STOK[idx];const sb=s.birim||'g';
    let m=miktar;
    if(rb==='kg'&&sb==='g')m=miktar*1000;
    else if(rb==='g'&&sb==='kg')m=miktar/1000;
    else if(rb==='L'&&sb==='mL')m=miktar*1000;
    else if(rb==='mL'&&sb==='L')m=miktar/1000;
    else if((rb==='pk'||rb==='paket')&&(sb==='pk'||sb==='paket'))m=miktar;
    else if(rb===sb)m=miktar;
    else m=miktar; // aynı birim varsay
    STOK[idx]={...s,miktar:Math.max(0,Math.round(((s.miktar||0)-m)*1000)/1000)};
    return true;
  }
  let dustuler=[];
  // Maltlar (kg)
  (tarif.maltlar||[]).forEach(m=>{
    const malt=MALTLAR.find(x=>x.id===m.id);
    const ad=malt?malt.ad:m.id;
    const idx=malBul(m.id,ad);
    if(dustur(idx,m.kg,'kg'))dustuler.push(ad.split('(')[0].trim()+' '+m.kg+'kg');
  });
  // Hoplar (g) — aynı ID toplan
  const hopTop={};
  (tarif.hoplar||[]).forEach(h=>{hopTop[h.id]=(hopTop[h.id]||0)+(h.g||0);});
  Object.entries(hopTop).forEach(([hid,gr])=>{
    const hop=HOPLAR.find(x=>x.id===hid);
    const ad=hop?hop.ad:hid;
    const idx=malBul(hid,ad);
    if(dustur(idx,gr,'g'))dustuler.push(ad.split('(')[0].trim()+' '+gr+'g');
  });
  // Maya (1 pk)
  [tarif.mayaId,tarif.maya2Id].filter(Boolean).forEach(mid=>{
    const maya=MAYALAR.find(x=>x.id===mid);
    if(!maya)return;
    const idx=malBul(mid,maya.ad);
    if(dustur(idx,1,'pk'))dustuler.push(maya.ad.split('(')[0].trim()+' 1pk');
  });
  // Katkılar
  (tarif.katkilar||[]).forEach(k=>{
    const idx=malBul(k.id,k.ad||'');
    if(dustur(idx,k.miktar||0,k.birim||'g'))
      dustuler.push((k.ad||k.id).split('(')[0].trim()+' '+k.miktar+(k.birim||'g'));
  });
  // Su mineralleri (g)
  (tarif.suMineralleri||[]).forEach(sm=>{
    const min=MINERALLER.find(x=>x.id===sm.id);
    if(!min)return;
    const idx=malBul(sm.id,min.ad);
    if(dustur(idx,sm.miktar||0,'g'))
      dustuler.push(min.ad.split('(')[0].trim()+' '+sm.miktar+'g');
  });
  if(dustuler.length>0){
    stokKaydet(STOK);
    flash('📦 Arşive taşındı — stoktan düşüldü: '+dustuler.join(', ')+' ✓');
  } else {
    flash('📦 Arşive taşındı ✓');
  }
}
function stoktenGeriKoy(tarif){
  function malBul(id,ad){
    const idL=(id||'').toLowerCase(),adL=(ad||'').toLowerCase();
    return STOK.findIndex(s=>{const sL=(s.ad||'').toLowerCase();
      return sL===adL||sL.includes(adL)||adL.includes(sL)||sL===idL||sL.replace(/\s+/g,'_')===idL;});
  }
  function geriKoy(idx,miktar,rb){
    if(idx<0)return false;
    const s=STOK[idx];const sb=s.birim||'g';let m=miktar;
    if(rb==='kg'&&sb==='g')m=miktar*1000;
    else if(rb==='g'&&sb==='kg')m=miktar/1000;
    else if(rb==='L'&&sb==='mL')m=miktar*1000;
    else if(rb==='mL'&&sb==='L')m=miktar/1000;
    STOK[idx]={...s,miktar:Math.round(((s.miktar||0)+m)*1000)/1000};
    return true;
  }
  let gerilenler=[];
  (tarif.maltlar||[]).forEach(m=>{
    const malt=MALTLAR.find(x=>x.id===m.id);const ad=malt?malt.ad:m.id;
    if(geriKoy(malBul(m.id,ad),m.kg,'kg'))gerilenler.push(ad.split('(')[0].trim()+' '+m.kg+'kg');
  });
  const hopTop={};
  (tarif.hoplar||[]).forEach(h=>{hopTop[h.id]=(hopTop[h.id]||0)+(h.g||0);});
  Object.entries(hopTop).forEach(([hid,gr])=>{
    const hop=HOPLAR.find(x=>x.id===hid);const ad=hop?hop.ad:hid;
    if(geriKoy(malBul(hid,ad),gr,'g'))gerilenler.push(ad.split('(')[0].trim()+' '+gr+'g');
  });
  [tarif.mayaId,tarif.maya2Id].filter(Boolean).forEach(mid=>{
    const maya=MAYALAR.find(x=>x.id===mid);if(!maya)return;
    if(geriKoy(malBul(mid,maya.ad),1,'pk'))gerilenler.push(maya.ad.split('(')[0].trim()+' 1pk');
  });
  (tarif.katkilar||[]).forEach(k=>{
    if(geriKoy(malBul(k.id,k.ad||''),k.miktar||0,k.birim||'g'))
      gerilenler.push((k.ad||k.id).split('(')[0].trim()+' '+k.miktar+(k.birim||'g'));
  });
  (tarif.suMineralleri||[]).forEach(sm=>{
    const min=MINERALLER.find(x=>x.id===sm.id);if(!min)return;
    if(geriKoy(malBul(sm.id,min.ad),sm.miktar||0,'g'))
      gerilenler.push(min.ad.split('(')[0].trim()+' '+sm.miktar+'g');
  });
  if(gerilenler.length>0){
    stokKaydet(STOK);
    flash('↩️ Arşivden çıkarıldı — stoğa geri eklendi: '+gerilenler.join(', ')+' ✓');
  } else {
    flash('↩️ Arşivden çıkarıldı ✓');
  }
}

function calc(){
  const katkilar=S.katkilar||[];
  const h=S.hacim||11;
  const ogHesap=hOG(S.maltlar,S.verim,katkilar,h);
  const ogManuelVal=S.ogManuel?parseFloat(S.ogManuel):null;
  const og=(ogManuelVal&&ogManuelVal>1.000)?ogManuelVal:ogHesap;
  const ogKaynak=ogManuelVal&&ogManuelVal>1.000?"manuel":"hesap";
  const srm=hSRM(S.maltlar,katkilar,h),ibu=hIBU(S.hoplar,og,h);
  const maya=MAYALAR.find(m=>m.id===S.mayaId)||null;
  const maya2=S.maya2Id?MAYALAR.find(m=>m.id===S.maya2Id)||null:null;
  // İki maya: attenüasyon ortalaması alınır
  let fgHesap=og;
  if(maya&&maya2){
    const a1=(maya.atu[0]+maya.atu[1])/2, a2=(maya2.atu[0]+maya2.atu[1])/2;
    fgHesap=1+(og-1)*(1-(a1+a2)/2/100);
  }else if(maya){
    const atu=(maya.atu[0]+maya.atu[1]);
    fgHesap=atu>0?1+(og-1)*(1-atu/200):og;
  }
  // Mash sıcaklığı FG düzeltmesi: 65°C referans, her ±1°C → ±0.001 FG
  const mashFGDuzeltme=((S.mashSc||67)-65)*0.001;
  fgHesap=Math.min(og-0.001,Math.max(1.000,fgHesap+mashFGDuzeltme));
  // Manuel FG override: kullanıcı kendi ölçtüğü değeri girebilir
  const fgManuelVal=S.fgManuel?parseFloat(S.fgManuel):null;
  const fg=(fgManuelVal&&fgManuelVal>1.000&&fgManuelVal<og)?fgManuelVal:fgHesap;
  const fgKaynak=fgManuelVal&&fgManuelVal>1.000&&fgManuelVal<og?"manuel":"hesap";
  // ABV — Alternatif (Balling) formül: daha doğru, özellikle yüksek OG'de
  const abv=og>=1.774?0:(76.08*(og-fg)/(1.775-og))*(fg/0.794);
  const topMalt=S.maltlar.reduce((s,m)=>{const ml=MALTLAR.find(x=>x.id===m.id);return (!ml||ml.g==="Şeker"||m.id==="rice")?s:s+m.kg;},0);
  return{og,ogHesap,ogKaynak,srm,ibu,maya,maya2,fg,fgHesap,fgKaynak,abv,topMalt,rk:srmR(srm)};
}

  "azacca":"Tat: Mango, portakal, ananas — çok tatlı. AA: %15. Dry hop: 10-15g/10L. Stiller: NEIPA, Tropical IPA. Not: Yüksek AA'lı tropikal; hem bittering hem aroma için kullanılabilir.",
  "bal":"Tat: Çiçek balı aroması — fermantasyonun büyük kısmı kaybolur, hafif bal kalır. Koku: Hafif çiçek balı, vaks nüansı. Gövde: OG artırır ama FG düşük (bal %95 fermentable). GU: 320. Kullanım: %5-15, kaynatma sonunda veya fermentasyon ortasında ekle. Stiller: Honey Ale, Braggot, Mead/Bira hibrit. Not: Ham bal kullan; pastörize bala göre daha fazla aroma kalır.",

  "bb_lager":"Tat: Temiz lager — W-34/70 eşdeğeri, BiraBurada yerli lager mayası. Koku: Minimal, malt öne çıkar. Attenuation: %74. Sıcaklık: 9-15°C. Stiller: Czech Pils, German Helles, Märzen, Lager. Not: 9-12°C'de fermente et; 0-2°C'de en az 3 hafta lager uygula.",

  "bb_pilsner":"Tat: Temiz lager — W-34/70 eşdeğeri, BiraBurada pilsner mayası. Koku: Minimal. Attenuation: %74. Sıcaklık: 9-15°C. Stiller: Czech Pilsner, German Pilsner, Helles.",

  "be134":"Tat: Çiçeksi, baharatlı, çok kuru bitiş — Saison tanımı. Koku: Çiçeksi ve baharatlı. Attenuation: %82. Sıcaklık: 20-30°C (yüksek sıcaklık fermentasyona yardımcı olur). Stiller: Saison, Farmhouse Ale, Belgian Blonde. Not: BE-134 stall problemi yaşayabilir; sıcaklığı kademeli artır.",
  "be256":"Tat: Elma, armut, muz, karanfil — Belçika Abbey profili. Koku: Karma meyve ve baharat. Attenuation: %82. Sıcaklık: 18-24°C. Stiller: Dubbel, Tripel, Belgian Golden Strong, Belgian IPA. Not: Çok yüksek attenuation; yüksek OG biralar için ideal.",

  "bentonit":"Kullanım: Fermentasyon sonunda veya cold crash sırasında. 2-5g / 10L soğuk suda çöz, fermentere ekle, 24-48 saat bekle, süz. Etki: Protein ve maya partikülleri çöktürür. Not: Berraklık için jelatin veya isinglass ile birlikte kullanmak daha etkili.",

  "best_pils":"Tat: Pilsner Malt ile özdeş — Alman temizliği ve nötr profil. Koku: Minimal, hafif tahıl. GU: 290, 2°L. Kullanım: %80-100. Stiller: Pilsner, Helles, Lager.",
  "beyaz_cay":"Fermente OLMAZ. OG/SRM'ye etkisi yok. Nazik çiçeksi-ot nüansı. Kullanım: Flameout veya dry hop (soğuk).",
  "biberiye":"Tat: Reçineli, çam, Akdeniz bitkisel aroması. Koku: Çam, iğne yapraklı. Kullanım: 2-5g kuru / 10L. Son 5 dk kaynatma veya dry add. Stiller: Saison, Farmhouse, Winter Ale.",
  "bisk":"Tat: Güçlü bisküvi, kavrulmuş ekmek kabuğu, ceviz, hafif tahıl. Koku: Fırın bisküvisi, kavrulmuş tahıl, fındık. Gövde: Orta, yapı verir. Renk: 25°L. GU: 278. Kullanım: %5-10. Stiller: English Pale Ale, Bitter, ESB, Brown Ale, Porter. Not: İngiliz stillerin 'gizli malzeması'; kompleks bisküvi karakteri katar.",
  "bitter_cik":"Fermente OLMAZ. Renk katkısı: 15°L. Bitter çikolata, yoğun kakao derinliği Kullanım: Kaynatma sonu veya fermantasyon sonu.",
  "black":"Tat: Çok sert yanmış tahıl, kibrit, kül — çok güçlü astrenjan. Koku: Yanmış, kül, tütün. Renk: 600°L. GU: 230. Kullanım: %1-3 MAX. Stiller: Imperial Stout, Black Malt temini. Not: En sert koyu malt; çok az kullan. Carafa III debittered versiyonu daha kullanışlı.",
  "black_pepper":"Fermente OLMAZ. Keskin biber acılığı, baharat Kullanım: Son 5 dk kaynatma veya dry-hop.",
  "bohemian":"Tat: Çek lager maltı — hafif topraksı, arpa tatlılığı, çok nötr. Koku: Hafif tahıl, temiz. Gövde: Hafif-orta. GU: 290, 2°L. Kullanım: %80-100 base malt. Çek Lager karakterini destekler. Stiller: Czech Pilsner, Bohemian Lager, Pilsner Urquell tarzı. Not: Pilsner Malt'tan çok az farklı; Çek lager için authenticity katar.",
  "bourbon_mese":"Fermente OLMAZ. Renk katkısı: 15°L. Bourbon + meşe + vanilya + karamel Kullanım: Secondary, 1-3 hafta.",
  "brett_b":"Tat: Deri, ahır, at, tropikal meyve — Brettanomyces kimliği. Koku: Çok belirgin 'barnyard' ve 'leather'. Attenuation: %85+. Sıcaklık: 18-24°C (çok yavaş). Stiller: Lambic, Gueuze, Belgian Wild Ale. DİKKAT: Brett ekipmanı kalıcı olarak kontamine eder — ayrı ekipman kullan!",
  "briess_6row":"Tat: Yüksek enzimli pale, biraz astrenjan olabilir. GU: 285. Adjunct reçeteler için.",

  "brown":"Tat: Kavrulmuş tahıl, tost, hafif kahve ve çikolata başlangıcı, topraksı. Koku: Kavrulmuş ekmek, bisküvi+tost. Gövde: Orta. Renk: 65°L. GU: 270. Kullanım: %5-15. Stiller: Porter (tarihi), Brown Ale, Old Ale, Scottish Ale. Not: İngiliz Porter'ın tarihi malti; Amber Maltten daha koyu ve kompleks.",
  "buckwheat":"Tat: Topraksı, fındıksı, bitkisel karabuğday karakteri. Koku: Topraksı, hafif bitkisel. Gövde: Hafif kremsi. Renk: 3°L. GU: 260. Kullanım: %5-15 (glütensiz reçetelerde). Stiller: Farmhouse Ale, Saison, Glütensiz Bira. Not: Beta-glukan içerir; çeltik kavuzu ekle. Soyularak (hulled) kullan.",
  "c10":"Tat: Çok hafif tatlılık, neredeyse fark edilmez. Renk: 10°L. GU: 272. Kullanım: %2-5 renk telafisi için. Stiller: Lager, Blonde, Pilsner'e minimal renk.",
  "c120":"Tat: Kuru üzüm, incir, tatlı soya sosu, kavrulmuş şeker — çok yoğun. Koku: Kuru meyve, tatlı Maillard. Gövde: Dolgun, kalıcı tatlılık. Renk: 120°L (kırmızı-koyu). GU: 260. Kullanım: %2-8 MAX. Fazlası birayı şeker gibi yapar. Stiller: Barleywine, Old Ale, Winter Warmer, Belgian Dark Strong. Not: Çok güçlü; %5'te bile dominant olabilir.",

  "c60":"Tat: Yoğun karamel, toffee, kuru meyve, incir başlangıcı. Koku: Derin karamel, şeker kamışı. Gövde: Dolgun, tatlılık belirgin. Renk: 60°L (koyu amber). GU: 265. Kullanım: %5-12. Stiller: Scottish Ale, American Amber, Red Ale, Märzen. Not: C40'tan sonra en çok kullanılan crystal; daha derin karamel için tercih edilir.",
  "c80":"Tat: Çok yoğun karamel, incir, kuru erik, hafif kavrulmuş tahıl. Koku: Derin karamel, kuru üzüm nüansı. Gövde: Dolgun. Renk: 80°L (koyu amber-kırmızı). GU: 265. Kullanım: %3-10. Stiller: Scottish Heavy, Brown Ale, American Amber, Winter Ale. Not: Güçlü tatlılık katar; çok kullanmamaya dikkat.",
  "cacl2":"İyon: Ca²⁺ (kalsiyum) + Cl⁻ (klorür). Etki: Malt dolgunluğunu ve tatlılığını artırır; birayı 'yumuşak' yapar. pH düşürür. Kullanım: 2-5g / 10L. Stout, Porter, Malt Ale, NEIPA için. Hedef: Ca²⁺ >50ppm, Cl⁻ 50-100ppm. Not: CaSO₄'ın karşıtı; Cl⁻:SO₄²⁻ oranı tadı belirler (1:1 = dengeli).",
  "caco3":"İyon: Ca²⁺ + CO₃²⁻ (karbonat). Etki: pH yükseltir, alkalinite artırır. Dark ve heavily roasted malt biralar için. Kullanım: 1-3g / 10L (mash'a ekle). Not: Çok az çözünür; CaCO₃ çözündürmek için CO₂ gerekir. NaHCO₃ daha pratik.",
  "callista":"Tat: Çilek, meyvesel — Alman aromalı hop. AA: %3-5. Kullanım: Aroma. 10-15g/10L. Stiller: Wheat Ale, Saison.",
  "calypso":"Tat: Armut, elma, hafif çiçeksi — çok yumuşak. Koku: Çekirdekli meyve. AA: %12. Dry hop: 10-15g/10L. Stiller: Pale Ale, Blonde Ale.",
  "candi_s":"GU: 380 (Fermente olur). OG artar, renk vermez, tamamen fermente olur. Kullanım: Kaynatmada.",
  "candy_amb":"Tat: Hafif karamel, toffee, amber şeker aroması. Koku: Şeker kamışı, karamel. Gövde: OG artırır, FG hafif yüksek. GU: 320, 46°L. Kullanım: %5-15. Stiller: Belgian Amber, Belgian Dubbel, Strong Ale. Not: D-90 (Dunkel-90) kodu; gerçek Belçika şeker kamışından üretilmiş.",
  "candy_clr":"Tat: Şeffaf — tat katkısı neredeyse yok, saf fermentable. Koku: Yok. Gövde: Azaltır (kuru bitiş). GU: 380. Kullanım: %5-20. Kaynatma sonunda veya ayrı kapta eritip fermantasyona ekle. Stiller: Belçika Tripel, Golden Strong Ale, Dubbel (az miktarda). Not: Belçika şeker geleneği; yüksek OG'yi maya için daha fermentable yapar.",
  "candy_drk":"Tat: Kuru üzüm, incir, çikolata, kakao tozu, şeker kamışı — çok kompleks. Koku: Kuru meyve, Maillard, hafif kahve. Gövde: OG artırır. GU: 310, 93°L. Kullanım: %5-15 (fazlası çok baskın olur). Stiller: Belçika Dubbel, Quad, Dark Strong Ale. Not: D-180 kodu; Belçika dark ale'lerinin eşsiz 'kuru üzüm' notasının kaynağı.",
  "cara120":"Tat: Kuru üzüm, incir, derin karamel — Crystal 120 eşdeğeri, Dingemans üretim. Koku: Kuru meyve, Maillard. Gövde: Dolgun. Renk: 120°L. GU: 258. Kullanım: %2-6. Stiller: Dubbel, Quad, Belgian Dark, Barleywine.",
  "cara45":"Tat: Karamel, toffee — Crystal 40-50 arası, Belçika üretim. Koku: Tatlı karamel. Gövde: Artırır. Renk: 45°L. GU: 268. Kullanım: %5-10. Stiller: Belgian Pale Ale, Amber Ale, Irish Red.",

  "cara_foam":"Tat: Neredeyse yok — sadece köpük kalıcılığı ve dolgunluk için özelleştirilmiş. Koku: Yok. Gövde: Artırır, köpük kalıcılığı güçlü. Renk: 2°L. GU: 270 (fermente olmaz). Kullanım: %2-5. CaraPils ile özdeş işlev. Stiller: Her stil — köpük problemi yaşayan reçetelerde.",

  "mj_m84":"Tat: Bohemian Lager — Çek lager karakteri, WY2124 benzeri. Koku: Hafif çiçeksi, Çek lager nüansı. Attenuation: %72. Sıcaklık: 8-12°C. Stiller: Czech Pilsner, Bohemian Lager.",
  "mj_m85":"Tat: Bière de Garde — Fransız Farmhouse karakteri, saison profili. Koku: Meyvesel, hafif topraksı. Attenuation: %82. Sıcaklık: 12-20°C. Stiller: Bière de Garde, French Farmhouse, Saison.",
  "molasses":"Tat: Çok yoğun melas, yanık şeker, demir nüansı. GU: 290. Kullanım: 30-80g/10L MAX.",
  "mosaic":"Tat: Yaban mersini, mango, passionfruit, topraksı derinlik. Koku: Karmaşık berry/tropik karışımı — çok boyutlu. AA: %12.5. Kullanım: Aroma ve dry hop odaklı. Dry hop: 15-20g/10L. Whirlpool: 10-15g/10L. Stiller: NEIPA, Hazy IPA, Tropical Sour. Not: Citra ile birlikte NEIPA'nın 'dinamik ikilisi'; Berry/tropik dengesi mükemmel.",
  "motueka":"Tat: Lime, limon, hafif çiçeksi — Saaz ailesinden. Koku: Lime ve limon. AA: %7. Kullanım: Aroma. 10-15g/10L. Stiller: Lager, Pils, Saison, Wheat Ale. Not: Saaz'dan türetilmiş; Noble karakterle sitrus kombinasyonu.",
  "munich":"Tat: Yoğun Maillard ekmek, kavrulmuş tahıl, hafif karamel, tatlı bisküvi. Koku: Malt ağırlıklı, taze ekmek, hafif çiçeksi, amber bal nüansı. Gövde: Orta-dolu. Renk: 9°L (amber-altın). GU: 280. Kullanım: %40-100. Tek başına base malt olarak kullanılabilir. Stiller: Märzen, Oktoberfest, Munich Dunkel, Festbier, Bock, Munich Helles.",
  "munich_light":"Tat: Munich'in açık versiyonu, hafif Maillard. GU: 282, 6°L. Stiller: Helles, Kölsch.",
  "muscovado":"Tat: Ham esmer şeker, melas, şeker kamışı, hafif karamel. GU: 360. Kullanım: %5-15.",
  "muskat":"Fermente OLMAZ. OG/SRM'ye etkisi yok. Sıcak-tatlı baharat nüansı. Kullanım: Kaynatma sonu (5 dk) veya dry hop.",
  "musmula":"Tat: Tatlı-ekşi çekirdekli meyve — ayva ve muşmula arasında. Koku: Çiçeksi-meyvesel. Kullanım: 300-500g püre / 10L. Stiller: Belgian Ale, Meyve Birası, Farmhouse.",
  "nacl":"İyon: Na⁺ (sodyum) + Cl⁻ (klorür). Etki: Malt tatlılığı, dolgunluk ve 'roundness'. Bira lezzetini öne çıkarır. Kullanım: 0.5-2g / 10L. Hedef: Na⁺ <50ppm (daha fazlası tuzlu tat). Not: Gose'nun geleneksel tuzu; tuz lezzetini 10-50ppm'de artırır.",
  "nahco3":"İyon: Na⁺ + HCO₃⁻ (bikarbonat). Etki: pH yükseltir, alkalinite artırır. Koyu biralar için gerekli. Kullanım: 0.5-2g / 10L. Stout ve Porter suyu için. Hedef: Mash pH'ı 5.2-5.4 olmalı — bikarbonat pH'ı yükseltir. Not: Dublin suyu; İrlanda Stout'un çok yüksek bikarbonatı karakteristik profil verir.",
  "naked_oat":"Fermente OLMAZ. Çok kremsi, az kavurma acılığı Kullanım: Mash — MALTLAR sekmesini kullanın.",
  "nane":"Tat: Ferahlatıcı mentol, serinletici, yoğun nane. Koku: Güçlü mentol. Kullanım: 5-15g taze veya 2-5g kuru / 10L. Fermentasyon sonunda ekle. Stiller: Mint Stout, Summer Ale, Saison. Not: Mentol fermantasyonla kaybolmaz; dikkatli miktarda kullan.",
  "nar":"Fermente OLMAZ. Renk katkısı: 4°L. Ekşi-tatlı, koyu kırmızı, tanin Kullanım: Fermantasyon sonu.",

  "nbrewer":"Tat: Bitkisel, topraksı, hafif çiçeksi. AA: %9. Kullanım: Bittering ve hafif aroma. 10-15g/10L. Stiller: Alman Lager, Altbier. Not: Alman ve İngiliz karakter arası.",
  "nelson":"Tat: Beyaz şarap üzümü, kavun, bektaşiüzümü — eşsiz. Koku: Beyaz şarap aroması, çok belirgin ve kendine özgü. AA: %12.5. Kullanım: Aroma ve dry hop odaklı. Dry hop: 10-15g/10L. Stiller: NEIPA, NZ IPA, Farmhouse Ale. Not: Nelson Sauvin dünyada en özgün hoplardan biri; şarap yapımında da kullanılır.",
  "nobet_sek":"GU: 380 (Fermente olur). OG artar, tamamen fermente olur, kuru bitiş. Renk etkisi yok. Kullanım: Kaynatmada (son 10 dk).",
  "nottm":"Tat: US-05'e çok yakın, hafif daha kuru bitiş. Koku: Minimal ester. Attenuation: %80. Sıcaklık: 14-21°C. Stiller: American Ale, English Ale — her iki stil için. Not: US-05'in Lallemand versiyonu; birbiriyle değiştirilebilir.",
  "oat":"Tat: Nötr tahıl, hafif kremsi tatlılık — aroma katkısı minimal. Koku: Neredeyse yok, belki çok hafif yulaflık. Gövde: Kremsi, yumuşak, yağlı ağız hissi — biraya 'ipeksilik' katıyor. Renk: 2°L. GU: 260. Kullanım: %5-20 (fazlası filtrasyonu zorlaştırır). Stiller: NEIPA, Oatmeal Stout, Oatmeal Pale Ale. Not: Özellikle NEIPA'da kremsi 'mouthfeel' için vazgeçilmez.",
  "oat_malt":"Tat: Flaked Oats ile aynı kremsi ve yumuşak profil. Koku: Çok hafif tahıl. Gövde: Kremsi, yağlı. Renk: 2°L. GU: 270 (Flaked'den biraz yüksek). Kullanım: %5-20. Mash'ta daha stabil, enzim içeriyor. Stiller: NEIPA, Oatmeal Stout. Avantaj: Flaked Oats'tan daha stabil mash; proteaz rest gerekmeyebilir.",
  "oolong":"Fermente OLMAZ. Renk katkısı: 2°L. Çiçeksi, orta oksitlenmiş, karmaşık Kullanım: Fermantasyon sonu.",
  "pale_ale":"Tat: Ekmek kabuğu, bisküvi, hafif fındık ve tatlı tahıl. Koku: Taze ekmek, buğday, hafif bal nüansı. Gövde: Orta-dolu, kremsi. Renk: 3°L (altın sarısı). GU: 300. Kullanım: %80-100 tüm ale tabanı. Bile kullanılırsa diğer maltin %80'inden fazlası olabilir. Stiller: IPA, APA, Bitter, Stout, Porter, Amber, Brown Ale, Belgian Ale. Marka: Weyermann, Crisp, Simpsons, Dingemans.",
  "pale_choc":"Tat: Hafif çikolata, daha yumuşak kahve, daha az yanık nüansı. Koku: Hafif kakao, kremsi çikolata. Gövde: Renk: 200°L. GU: 255. Kullanım: %3-10. Stiller: Porter, Brown Ale — Chocolate Malt'tan daha yumuşak profil. Not: Astrenjan bulmak istemeyenler için; Chocolate Malt'tan daha zarif.",
  "pale_choc2":"Tat: Orta-koyu çikolata, derin kahve — Pale Chocolate Malt aralığı. Koku: Bitter çikolata, espresso. Renk: 450°L. GU: 256. Kullanım: %3-8 (Porter, Stout). Stiller: Porter, Chocolate Stout, Brown Ale. Not: Simpsons Extra Pale Chocolate; Chocolate Malt'tan daha yumuşak profil.",

  "pearl":"Tat: Maris Otter ile pratikte özdeş — temiz ekmek/bisküvi, hafif fındık. Koku: Taze İngiliz ekmek aroması. Gövde: Orta-dolgun. GU: 298, 3°L. Kullanım: %80-100. Maris Otter yerine 1:1 kullan. Stiller: Bitter, ESB, Porter, English IPA. Not: Crisp Malting'in Maris Otter alternatifi; bazı brewhouse'ların favorisi.",
  "pedio_b":"Tat: Çok güçlü laktik asit + diacetyl üretimi (olağan). Kullanım: Spontan fermentasyon veya Brett ile birlikte. Stiller: Lambic, Gueuze, Flanders Red. Not: Diacetyl (tereyağ) üretir — Brett ile birlikte kullandığında Brett temizler.",

  "polaris":"Tat: Nane nüanslı temiz bitter. AA: %20 (Avrupa rekoru). Kullanım: Bittering. 4-7g/10L. Not: Çok az kullan — 20% AA ile 5g bile 40+ IBU verebilir.",

  "progress":"Tat: Hafif çiçeksi, meyvesel, Goldings ailesi. AA: %6.5. Kullanım: Bittering ve aroma. 10-15g/10L. Stiller: British Pale Ale, Bitter. Not: EKG ve Fuggles ile aynı İngiliz hop ailesi.",

  "pvpp":"Kullanım: Şişeleme öncesi 1-2g / 10L. Etki: Tanen ve polifenol bağlar — soğuk bulanıklığını önler. Not: Bentonit ile birlikte kullan (Bentonit protein, PVPP polifenol bağlar).",
  "quinoa":"Tat: Hafif fındıksı, tohumsu — glütensiz adjunct. Koku: Yok. GU: ~240. Kullanım: %5-15. Saponini uzaklaştırmak için mutlaka yıka. Kısa cereal mash. Stiller: Glütensiz Ale.",
  "raw_oat":"Tat: Ham yulaf — Flaked Oats ile aynı kremsi/yumuşak profil ama daha ham. Koku: Hafif yulaf. Gövde: Kremsi ve yağlı ağız hissi. Renk: 2°L. GU: 255. Kullanım: %5-15 (90 dakika mash şart!). Stiller: NEIPA, Oatmeal Stout. Not: Marketlerden elde edilebilir; enzim yok. 65°C'de 90 dk mash gerektirir.",
  "rezene":"Tat: Tatlı anason/likoris — meyan kökü benzeri. Koku: Güçlü anason. Kullanım: 1-3g öğütülmüş / 10L. Son 5 dk kaynatma veya fermentasyon. Stiller: Saison, Witbier, Herbal Ale.",
  "rice":"Tat: Filtre yardımcısı — OG katkısı sıfır, tat katkısı sıfır. Koku: Yok. Gövde: Yok. Renk: 0°L. GU: 0. Kullanım: %5-15 ağırlık (mash tıkanmasını önlemek için). Stiller: Çavdar, yulaf, buğday ağırlıklı ANY reçete. DİKKAT: Bu Pirinç Kabuğu (Rice Hulls) = filtre yardımcısı. Pirinç malt değil!",
  "rice_flaked":"Tat: Çok nötr, hafif pirinç tatlılığı. Koku: Neredeyse yok. Gövde: Hafifletici. Renk: 1°L. GU: 272. Kullanım: %10-25. Stiller: American Lager, Light Lager, Cream Ale. Not: Mısır flakelere benzer; birayı hafifletir ve OG artırır ama gövde azalır.",

  "riwaka":"Tat: Greyfurt, bektaşiüzümü — çok aromatik NZ hop. Koku: Güçlü greyfurt/bektaşiüzümü. AA: %5.5. Dry hop: 10-15g/10L. Stiller: NEIPA, Pale Ale.",
  "roast":"Tat: Kuru kahve, espresso, yanık ekmek, belirgin astrenjan acılık. Koku: Espresso, kül, kavrulmuş tahıl. Gövde: Renk: 500°L. GU: 235. Kullanım: %5-15 (Irish Dry Stout için daha fazla). Stiller: Irish Dry Stout (Guinness tarzı), Robust Porter. Not: Guinness'in 'kuru' ve 'kül' karakterinin kaynağı; kavuk astrenjanı belirgin.",
  "roast_wheat":"Tat: Buğday + kavrum. Dunkelweizen rengi için. Renk: 400°L. GU: 232. Kullanım: %3-10.",
  "rooibos":"Fermente OLMAZ. Renk katkısı: 3°L. Vanilyalı-bitkisel, hafif tatlı, kırmızı Kullanım: Fermantasyon sonu.",
  "rum_mese":"Fermente OLMAZ. Renk katkısı: 12°L. Rum + tropikal + meşe karmaşıklığı Kullanım: Secondary, 1-3 hafta.",
  "rwh":"Tat: Buğday malt benzer ama daha ham ve topraksı. Koku: Taze buğday, hafif toprak. Gövde: Proteinli, bulanık, kremsi. Renk: 2°L. GU: 260. Kullanım: %15-30. Uzun mash şart (proteaz 50°C/15dk + sacch 65°C/90dk). Stiller: Belgian Wit, Lambic, Geuze. Not: Enzim içermez; mash uzatılmalı. Çeltik kavuzu ekle.",
  "rye":"Tat: Baharatlı, peppery, bitkisel çavdar karakteri + tahıl tatlılığı. Koku: Çavdar ekmeği, hafif baharatlı, topraksı. Gövde: Hafif kremsi ama beta-glukan nedeniyle ağız dolgunu. Renk: 4°L. GU: 275. Kullanım: %10-20 önerilir (fazlası mash'ı zora sokar). Stiller: Rye IPA, Roggenbier, Rye Pale Ale, Saison. DİKKAT: Beta-glukan çok fazla filtrasyonu zorlaştırır. Çeltik kavuzu şart.",
  "s04":"Tat: Hafif İngiliz meyvesel ester — elma, armut nüansı. Koku: Hafif meyvesel. Gövde: Orta-dolgun. Attenuation: %75. Sıcaklık: 18-22°C. Stiller: Bitter, ESB, Porter, Stout, English IPA. Not: İngiliz Ale karakteri için US-05'ten daha uygun; biraz daha tatlı bitiş.",

  "s33":"Tat: Belçika meyve ve baharat esteri — orta yoğunluk. Koku: Elma, armut, hafif karanfil. Attenuation: %75. Sıcaklık: 18-24°C. Stiller: Belgian Pale Ale, Belgian Wit, Saison. Not: Belçika stilleri için giriş seviyesi; WB-06'dan daha uygun Belçika esteri.",
  "saaz":"Tat: Bitkisel, topraksı, hafif baharatlı — en saf Nobel aroma. Koku: Klasik Pilsner aroması; topraksı/çiçeksi. AA: %3.5. Kullanım: Hem bittering hem aroma. 20-30g/10L. Stiller: Czech Pilsner, German Lager, Hefeweizen. Not: Pilsner Urquell'in hammaddesi; Nobel hop'ların en tanınan temsilcisi.",
  "sabro":"Tat: Hindistan cevizi, tropik meyve, mentol — çok özgün. Koku: Hint cevizi ve tropikal. AA: %13. Dry hop: 10-15g/10L. Stiller: NEIPA, Tropical IPA. Not: Sabro'nun eşsiz hindistan cevizi aroması başka hopla elde edilemez.",
  "seftali":"Fermente OLMAZ. Tropikal tatlı meyve, şeftali aroması · Renk: Renk etkisi yok. Kullanım: Fermantasyon sonu.",

  "sherry_mese":"Fermente OLMAZ. Renk katkısı: 1°L. Kuru meyve + fındık + oksitlenmiş Kullanım: Secondary 2-4 hafta.",
  "simcoe":"Tat: Çam reçinesi, sarı elma, tropik meyve — çok kompleks. Koku: Güçlü çam, reçine, hafif passionfruit. AA: %13. Kullanım: Hem bittering hem dry hop. Dry hop: 10-15g/10L. Stiller: West Coast IPA, Double IPA, American Pale. Not: West Coast IPA'nın 'piney' karakterinin kaynağı.",
  "simp_golden":"Tat: Hafif karamel ve amber renk — Golden Promise Crystal 30°L aralığı. Koku: Hafif karamel. Renk: 30°L. GU: 270. Kullanım: %3-8. Stiller: Scottish Pale Ale, Golden Ale.",
  "simp_heritage":"Tat: Orta karamel, toffee — Simpsons Heritage Crystal 65°L. Koku: Karamel. Renk: 65°L. GU: 268. Kullanım: %5-10. Stiller: British Bitter, ESB.",
  "sinamar":"Tat: OG katkısı yok — sadece siyah renk. Renk: 800°L. Kullanım: 5-10mL/10L. Fermantasyon sonunda ekle.",
  "smoked":"Tat: Belirgin kayın ağacı dumanı, tütsü eti, Rauchbier kimliği. Koku: Yoğun duman, odun, jambon/sosis nüansı. Gövde: Normal base malt gibi. Renk: 4°L. GU: 288. Kullanım: %30-100 (duman şiddeti isteğe göre ayarlanır). Stiller: Rauchbier, Smoked Porter, Bamberg tarzı lager. Not: %30 isli malt = hafif duman; %80+ = çok belirgin Rauchbier karakteri.",
  "smoked_oak":"Tat: Meşe dumanı — kayından daha keskin, biraz daha odunsu ve reçineli duman. Koku: Meşe odunu dumanı, hafif vanilya (meşeden gelen). Gövde: Normal base malt gibi. Renk: 4°L. GU: 287. Kullanım: %20-60. Stiller: Smoked Porter, American Smoked Ale, meşe duman karakteri istenen biralar. Not: Rauchbier için kayın (beech) daha otantik; meşe isli malt farklı profil verir.",
  "smoked_peat":"Tat: Çok güçlü, ilaçlı, fenollü İskoç torf dumanı. Viski tadını andırır. Koku: İlaçlı, tıbbi, deniz yosunu ve torf. Gövde: Normal base malt. Renk: 3°L. GU: 285. Kullanım: %5-15 MAX! Daha fazlası içilemez hale getirir. Stiller: Scottish Peaty Ale, Wee Heavy, Scotch Ale tarzı biralar. DİKKAT: Kayın isli maltten 10 kat daha yoğun. Çok az kullan.",
  "sorghum":"Tat: Hafif tatlı, nötr tahıl — glütensiz bira için temel adjunct. Koku: Hafif tahıl. Gövde: Orta. Renk: 2°L. GU: 280. Kullanım: %10-30 (glütensiz reçetelerde base olarak). Stiller: Glütensiz Ale, Glütensiz Lager, African Style Beer. Not: Çekilmesi için özel mash prosesi gerekebilir.",

function stokKontrolHTML(){
  if(!STOK||STOK.length===0) return '';

  function stokBul(id, ad){
    const idL=(id||'').toLowerCase();
    const adL=(ad||'').toLowerCase();
    return STOK.find(s=>{
      const sL=(s.ad||'').toLowerCase();
      return sL===adL||sL.includes(adL)||adL.includes(sL)||
             sL===idL||sL.replace(/\s+/g,'_')===idL;
    });
  }

  const kategoriler=[
    {isim:'🌾 Maltlar',items:S.maltlar.map(m=>{
      const ml=MALTLAR.find(x=>x.id===m.id);
      return{id:m.id,ad:ml?.ad||m.id,miktar:m.kg+'kg'};
    })},
    {isim:'🌿 Hoplar',items:S.hoplar.map(h=>{
      const hp=HOPLAR.find(x=>x.id===h.id);
      return{id:h.id,ad:hp?.ad||h.id,miktar:h.g+'g'};
    })},
    {isim:'🔬 Maya',items:(()=>{
      const list=[];
      if(S.mayaId){const my=MAYALAR.find(x=>x.id===S.mayaId);list.push({id:S.mayaId,ad:my?.ad||S.mayaId,miktar:'1 paket'});}
      if(S.maya2Id){const m2=MAYALAR.find(x=>x.id===S.maya2Id);list.push({id:S.maya2Id,ad:m2?.ad||S.maya2Id,miktar:'1 paket'});}
      return list;
    })()},
    {isim:'🧪 Katkılar',items:(S.katkilar||[]).map(k=>{
      const kat=KATKILAR.find(x=>x.id===k.id);
      return{id:k.id,ad:k.ad||(kat?.ad||k.id),miktar:k.miktar+(k.birim||'g')};
    })},
    {isim:'💧 Su Mineralleri',items:(S.suMineralleri||[]).filter(m=>m.miktar>0).map(m=>{
      const mn=MINERALLER.find(x=>x.id===m.id);
      return{id:m.id,ad:mn?.ad||m.id,miktar:m.miktar+'g/mL'};
    })},
  ];

  let html='<div style="background:#fff;border:1px solid var(--bor);border-radius:12px;overflow:hidden;margin-bottom:10px">';
  html+='<div style="padding:10px 14px;background:var(--bg2);border-bottom:1px solid var(--bor);font-size:12px;font-weight:700;color:var(--kahve)">📦 Stok Durumu & Muadiller</div>';

  let satirlar='';

  kategoriler.forEach(kat=>{
    if(!kat.items||kat.items.length===0)return;
    satirlar+=`<div style="padding:5px 14px;background:rgba(0,0,0,0.025);font-size:10px;font-weight:700;color:var(--dim);letter-spacing:0.5px;border-top:1px solid var(--bor)">${kat.isim}</div>`;
    kat.items.forEach(item=>{
      const stokItem=stokBul(item.id,item.ad);
      const varMi=!!stokItem;
      const tumMuadiller=MUADIL[item.id]||[];

      // Ana satır
      satirlar+=`<div style="padding:8px 14px;border-top:1px solid var(--bor)">`;
      satirlar+=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:${tumMuadiller.length?'6':'0'}px">`;
      satirlar+=`<span style="font-size:14px;flex-shrink:0">${varMi?'✅':'❌'}</span>`;
      satirlar+=`<div style="flex:1;min-width:0">`;
      satirlar+=`<div style="font-size:12px;font-weight:600;color:var(--metin)">${esc(item.ad)}</div>`;
      satirlar+=`<div style="font-size:10px;color:var(--dim)">Reçete: ${esc(item.miktar)}`;
      if(varMi) satirlar+=` &nbsp;·&nbsp; Stokta: <b>${stokItem.miktar}${stokItem.birim}</b>`;
      satirlar+=`</div></div>`;
      if(!varMi) satirlar+=`<span style="font-size:10px;padding:2px 8px;border-radius:10px;background:#FFEEEE;color:#CC0000;font-weight:600;flex-shrink:0">Stokta Yok</span>`;
      satirlar+=`</div>`;

      // Muadiller — HEP göster
      if(tumMuadiller.length>0){
        satirlar+=`<div style="margin:0 14px 8px 22px;padding:6px 10px;background:${varMi?'#F8F8F0':'#F0F8FF'};border-radius:8px;border:1px solid ${varMi?'#E8E8C8':'#C8E0F8'}">`;
        satirlar+=`<div style="font-size:10px;font-weight:700;color:${varMi?'#666633':'#0066CC'};margin-bottom:5px">↔ Muadil Seçenekleri:</div>`;
        tumMuadiller.forEach((m,mi)=>{
          const mStok=stokBul(m.id,m.ad);
          const stokVar=!!mStok;
          satirlar+=`<div style="display:flex;gap:6px;align-items:flex-start;${mi>0?'margin-top:7px;padding-top:7px;border-top:1px solid rgba(0,0,0,0.06)':''}">`;
          satirlar+=`<span style="font-size:12px;flex-shrink:0;margin-top:1px">${stokVar?'✅':'⬜'}</span>`;
          satirlar+=`<div style="flex:1;min-width:0">`;
          // Muadil adı + stok durumu
          satirlar+=`<div style="font-size:11px;font-weight:600;color:var(--kahve)">${esc(m.ad)}`;
          if(stokVar) satirlar+=` <span style="font-size:10px;color:var(--yk);font-weight:400">(Stokta: ${mStok.miktar}${mStok.birim})</span>`;
          else satirlar+=` <span style="font-size:10px;color:var(--dim);font-weight:400">(stokta yok)</span>`;
          satirlar+=`</div>`;
          // Fark özeti
          if(m.fark) satirlar+=`<div style="font-size:10px;color:#444;margin-top:2px">${esc(m.fark)}</div>`;
          // Detay
          if(m.detay) satirlar+=`<div style="font-size:9px;color:var(--dim);margin-top:1px;font-style:italic">${esc(m.detay)}</div>`;
          satirlar+=`</div></div>`;
        });
        satirlar+=`</div>`;
      }
      satirlar+=`</div>`;
    });
  });

  html+=satirlar;
  html+='</div>';
  return html;
}

function setSekme(s){
  const notEl=document.getElementById("notText");
  if(notEl)S.notlar=notEl.value;
  // Ana sayfa scroll pozisyonunu koru
  const mainEl=document.getElementById("ekran");
  const sy=mainEl?mainEl.scrollTop:0;
  sekme=s;render();
  // İçerik en üste
  if(mainEl) mainEl.scrollTop=0;
  // Aktif sekme butonunu bar içinde görünür yap
  requestAnimationFrame(()=>{
    const _sbBar=document.querySelector('.sb');
    const aktifBtn=document.querySelector('.sb-btn[data-s="'+s+'"]');
    if(aktifBtn&&_sbBar){
      const bR=aktifBtn.getBoundingClientRect();
      const sR=_sbBar.getBoundingClientRect();
      if(bR.left<sR.left+10||bR.right>sR.right-10)
        _sbBar.scrollLeft+=bR.left-sR.left-(sR.width/2-bR.width/2);
    }
  });
}

  if(!maya)return[];
  const dh=hoplar.filter(h=>h.tur==="dry_hop"),fs=og>1.080?14:og>1.060?8:6;
  // 2. maya varsa: ana protokol 1. mayaya göre, ama sc ortalaması
  const sc2=maya2?(maya2.ek==="dolap"?Math.min(maya2.sc[1],18):maya2.ideal||maya2.sc[0]):null;
  const sc=maya.ek==="dolap"?Math.min(maya.sc[1],18):maya.ideal||maya.sc[0];
  const scEff=sc2?Math.round((sc+sc2)/2):sc;
  const L=[];
  if(maya.tip==="lager"){
    const lag=og>1.070?14:10,lag2=abv>7?12:8;
    L.push(`Gün 0: Pitching — ${maya.ideal||maya.sc[0]}°C`);
    L.push(`Gün 1-${lag}: Lager fermentasyonu — ${maya.sc[0]}°C sabit`);
    L.push(`Gün ${lag}-${lag+3}: Diacetyl rest — 16°C; 3 gün`);
    L.push(`Gün ${lag+3}: Cold crash — 5°C; 48 saat`);
    L.push(`Gün ${lag+5}-${lag+5+lag2*7}: Lagering — 5°C'de ${lag2} hafta`);
    L.push(`~Gün ${lag+5+lag2*7}: Şişele`);
  }else if(maya.tip==="kveik"){
    L.push(`Gün 0: Pitching — Hedef sıcaklık: ${maya.ideal}°C`);
    L.push(`Gün 0-3: Aktif fermentasyon — ${maya.sc[0]}-${maya.sc[1]}°C`);
    L.push(`Gün 3: FG kontrol — Hedef: ${fg.toFixed(3)}`);
    L.push(`Gün 4: Cold crash — 5°C; 48 saat`);
    L.push(`Gün 6: Şişele`);
    L.push(`Kondisyon: 18°C'de 7 gün`);
  }else if(maya.tip==="sour"){
    // Philly Sour / Lachancea — sour ale protokolü
    L.push(`Gün 0: Pitching — Hedef sıcaklık: ${maya.ideal}°C`);
    L.push(`   ⚠ Philly Sour laktik asit üretir — ayrı ekipman önerilir!`);
    L.push(`Gün 1-5: Aktif fermentasyon — ${maya.sc[0]}-${maya.sc[1]}°C`);
    L.push(`   ℹ pH takibi yap: hedef 3.2-3.8. Ekşilik 3-5. günde oluşur.`);
    L.push(`Gün 5: FG kontrol — Hedef: ${fg.toFixed(3)}`);
    L.push(`Gün 6: Cold crash — 5°C; 48 saat`);
    L.push(`Gün 8: Şişele`);
    L.push(`Kondisyon: ${abv>6?"4 hafta":"2 hafta"} — ekşilik olgunlaşır`);
  }else if(maya.tip==="belcika"||maya.tip==="saison"){
    if(maya.ek==="oda"){
      L.push(`Gün 0: Pitching — Oda sıcaklığı (${maya.sc[0]}-${maya.sc[1]}°C)`);
      L.push(`   ✓ Dolap veya ısıtıcı gerekmez; oda ${maya.sc[0]}-${maya.sc[1]}°C ise yeterli`);
      L.push(`Gün 1-5: Aktif fermentasyon — ${maya.sc[0]}-${maya.sc[1]}°C oda sıcaklığı`);
      L.push(`Gün 5-8: FG kontrol — Hedef: ${fg.toFixed(3)}`);
      L.push(`Gün 8: Cold crash — 5°C; 48 saat`);
      L.push(`Gün 10: Şişele`);
    }else{
      L.push(`Gün 0: Pitching — Hedef sıcaklık: 20°C`);
      L.push(`Gün 1-3: 20°C`);
      L.push(`Gün 3-5: ${Math.min(26,maya.sc[1])}°C'ye çıkar`);
      L.push(`Gün 5-8: ${maya.ideal||maya.sc[1]}°C`);
      L.push(`Gün 8: Cold crash — 5°C, 48 saat`);
      L.push(`Gün 10: Şişele`);
    }
    L.push(`Kondisyon: ${abv>8?"6 ay":abv>6?"6 hafta":"3 hafta"}`);
  }else if(maya.tip==="wheat"||maya.tip==="wit"){
    L.push(`Gün 0: Pitching — Dolap ${maya.ideal||17}°C`);
    L.push(`Gün 1-7: ${maya.sc[0]}-18°C dolabta sabit tut`);
    L.push(`   ⚠ Oda 24°C — dolabtan çıkartma!`);
    L.push(`Gün 7: FG kontrol — Hedef: ${fg.toFixed(3)}`);
    L.push(`Gün 8: Cold crash hafif — 10°C; 24 saat`);
    L.push(`Gün 9: Şişele — 4.0 vol CO₂`);
    L.push(`Kondisyon: 18°C'de 14 gün; döküm tekniğiyle servis`);
  }else if(maya.ek==="oda"){
    L.push(`Gün 0: Pitching — Oda sıcaklığı (${maya.sc[0]}-${maya.sc[1]}°C)`);
    L.push(`   ✓ Dolap veya ısıtıcı gerekmez; oda ${maya.sc[0]}-${maya.sc[1]}°C ise yeterli`);
    L.push(`Gün 1-${fs}: Aktif fermentasyon — oda sıcaklığı (${maya.sc[0]}-${maya.sc[1]}°C)`);
    L.push(`Gün ${fs}: FG kontrol — Hedef: ${fg.toFixed(3)}`);
    if(dh.length>0){L.push(`Gün ${fs+1}: Dry Hop — ${dh.map(h=>h._ad||h.id).join(", ")}; 4 gün`);L.push(`Gün ${fs+5}: Cold crash — 5°C; 48 saat`);L.push(`Gün ${fs+7}: Şişele`);}
    else{L.push(`Gün ${fs+1}: Cold crash — 5°C; 48 saat`);L.push(`Gün ${fs+3}: Şişele`);}
    L.push(`Kondisyon: 18°C'de ${abv>7?"3 ay":abv>5?"14 gün":"7 gün"}`);
  }else{
    // Standart Ale (dolap) — US-05, S-04, WY1056, WY1272, İngiliz Ale, vb.
    L.push(`Gün 0: Pitching — Dolap ${sc}°C`);
    L.push(`   ✓ Temiz ale mayası — diacetyl rest gerekmez`);
    L.push(`Gün 1-3: Aktif fermentasyon — köpük ve aktivite normal`);
    L.push(`Gün 3-${fs}: Fermentasyon yavaşlıyor — sıcaklık sabit tut (${sc}°C)`);
    L.push(`Gün ${fs}: FG kontrol — Hedef: ${fg.toFixed(3)}`);
    L.push(`   ℹ 2 gün arayla iki ölçüm al, değer sabitlendi mi kontrol et`);
    if(dh.length>0){
      L.push(`Gün ${fs+1}: Dry Hop — ${dh.map(h=>h._ad||h.id).join(", ")}; ${sc}°C'de 3-4 gün`);
      L.push(`   ✓ Biyotransformasyon için fermantasyon sıcaklığında beklet`);
      L.push(`Gün ${fs+5}: Cold crash — 5°C; 48 saat`);
      L.push(`Gün ${fs+7}: Şişele`);
    }else{
      L.push(`Gün ${fs+1}: Cold crash — 5°C; 48 saat`);
      L.push(`Gün ${fs+3}: Şişele`);
    }
    L.push(`Kondisyon: 18°C'de ${abv>10?"6 ay-1 yıl":abv>9?"3-6 ay":abv>7?"6-8 hafta":abv>5?"14 gün":"7 gün"}`);
  }
  // 2. maya notu ekle
  if(maya2){
    L.push("   ℹ 2. Maya: "+maya2.ad+" ("+maya2.sc[0]+"-"+maya2.sc[1]+"°C)");
    L.push("   ℹ FG ortalaması her iki mayadan hesaplandı.");
  }
  return L;
}


// ═══ STOK EKRANI ════════════════════════════════════════════
function rStok(){
  const sArama=sekmeArama.stok.toLowerCase();
  const stokKat=sekmKat.stok;
  const stokGruplari=[...new Set(STOK.map(s=>s.g||"Diğer"))].sort();
  const stokKatBar=stokGruplari.map(k=>{const n=STOK.filter(s=>(s.g||"Diğer")===k).length;const ak=stokKat===k;return`<button onclick="setSekmKat('stok','${k}')" style="flex-shrink:0;padding:4px 10px;border-radius:14px;border:1.5px solid ${ak?"var(--altin)":"var(--bor)"};background:${ak?"var(--sa)":"var(--card)"};color:${ak?"var(--bakir)":"var(--soluk)"};font-size:11px;font-weight:600;cursor:pointer">${k} (${n})</button>`;}).join("");
  const stokFiltreli=STOK.filter(s=>
    (!sArama||(s.ad.toLowerCase().includes(sArama)||(s.g||'').toLowerCase().includes(sArama)))&&
    (!stokKat||(s.g||"Diğer")===stokKat)
  );
  const stokGruplar={};stokFiltreli.forEach(s=>{(stokGruplar[s.g]=stokGruplar[s.g]||[]).push(s);});
  const stokListesi=stokFiltreli.length===0?
    '<div style="text-align:center;padding:30px;color:var(--dim);font-size:13px">Henüz stok kaydı yok.<br>Aşağıdan malzeme ekle.</div>':
    Object.entries(stokGruplar).map(function(sE,gi){
    var g=sE[0],items=sE[1];
    var _sI={'Malt':'🌾','Hop':'🌿','Maya':'🔬','Katkı':'🧪','Su Minerali':'💧','Diğer':'📦'};
    var ih=items.map(function(s){
      var idx=STOK.indexOf(s);
      var dusuk=s.uyari>0&&s.miktar<=s.uyari;
      return '<div class="satir" style="'+(dusuk?'border-color:#E0A0A0;background:#FFF8F8;':'')+'margin-bottom:6px">'
        +'<div style="flex:1;min-width:0"><div style="font-size:12px;font-weight:600;color:var(--metin)">'+esc(s.ad)+'</div>'
        +'<div style="font-size:10px;color:'+(dusuk?'var(--kk)':'var(--dim)')+'">'+(dusuk?'⚠️ ':'')+s.miktar+' '+s.birim+(s.uyari>0?' · Uyarı: '+s.uyari+s.birim:'')+'</div></div>'
        +'<div style="display:flex;align-items:center;gap:4px">'
        +'<button class="btn" style="background:none;color:var(--dim);font-size:16px;padding:0 6px" onclick="stokGuncelle('+idx+',-1)">−</button>'
        +'<input id="adim_'+idx+'" type="number" value="'+(s.adim||1)+'" min="1" style="width:40px;text-align:center;font-size:11px;padding:2px" class="inp">'
        +'<button class="btn" style="background:none;color:var(--yk);font-size:16px;padding:0 6px" onclick="stokGuncelle('+idx+',1)">+</button>'
        +'<button class="btn" style="background:none;color:var(--kk);font-size:18px;padding:0 4px" onclick="stokSil('+idx+')">×</button>'
        +'</div></div>';
    }).join('');
    return accGrup((_sI[g]||'📦')+' '+g+' ('+items.length+')',ih,'stok_'+g.replace(/\s+/g,'_'),true);
  }).join('');
  // Arama terimine göre dropdown filtrele
  const _sAr=sArama; // rStok başında tanımlı
  const _hFlt=_sAr?HOPLAR.filter(h=>h.ad.toLowerCase().includes(_sAr)):HOPLAR;
  const _mFlt=_sAr?MALTLAR.filter(m=>m.ad.toLowerCase().includes(_sAr)):MALTLAR;
  const _myFlt=_sAr?MAYALAR.filter(m=>m.ad.toLowerCase().includes(_sAr)):MAYALAR;
  const _mnFlt=_sAr?MINERALLER.filter(m=>m.ad.toLowerCase().includes(_sAr)):MINERALLER;
  const _kFlt=_sAr?KATKILAR.filter(k=>k.ad.toLowerCase().includes(_sAr)):KATKILAR;
  const _ddToplam=_hFlt.length+_mFlt.length+_myFlt.length+_mnFlt.length+_kFlt.length;

  const stokEkleForm=`
    <div class="kart" style="margin-bottom:10px">
      <div style="font-size:14px;font-weight:700;color:var(--kahve);margin-bottom:10px">📦 Stok Ekle</div>
      ${_sAr&&_ddToplam===0?'<div style="font-size:12px;color:var(--kk);margin-bottom:8px;padding:6px 10px;background:var(--ka);border-radius:6px">❌ "'+_sAr+'" listede yok — özel olarak ekleyebilirsin</div>':''}
      ${_sAr?'<div style="font-size:11px;color:var(--soluk);margin-bottom:6px">🔍 "'+_sAr+'" için '+_ddToplam+' sonuç</div>':''}
      <div style="margin-bottom:6px">
        <select id="stokKaynak" class="inp" style="margin-bottom:4px" onchange="stokSecimGuncelle(this.value)">
          <option value="">── Listeden seç ──</option>
          ${_hFlt.length?'<optgroup label="🌿 Hoplar ('+_hFlt.length+')">'+_hFlt.map(h=>'<option value="'+h.id+'|'+h.ad+'|g|Hop">'+h.ad+' ('+h.aa+'% AA)</option>').join("")+'</optgroup>':''}
          ${_mFlt.length?'<optgroup label="🌾 Maltlar ('+_mFlt.length+')">'+_mFlt.map(m=>'<option value="'+m.id+'|'+m.ad+'|g|Malt">'+m.ad+(m.r?' ('+m.r+'°L)':'')+'</option>').join("")+'</optgroup>':''}
          ${_myFlt.length?'<optgroup label="🧬 Mayalar ('+_myFlt.length+')">'+_myFlt.map(m=>'<option value="'+m.id+'|'+m.ad+'|paket|Maya">'+m.ad+'</option>').join("")+'</optgroup>':''}
          ${_mnFlt.length?'<optgroup label="💧 Su Mineralleri">'+_mnFlt.map(m=>'<option value="'+m.id+'|'+m.ad+'|g|Su Minerali">'+m.ad+'</option>').join("")+'</optgroup>':''}
          ${_kFlt.length?'<optgroup label="🧪 Katkı Malzemeleri">'+_kFlt.map(k=>'<option value="'+k.id+'|'+k.ad+'|'+k.birim+'|'+k.g+'">'+k.ad+'</option>').join("")+'</optgroup>':''}
          <optgroup label="── Özel ──"><option value="ozel">Özel / Listede yok</option></optgroup>
        </select>
        <input type="text" id="stokAd" class="inp" placeholder="Malzeme adı" style="margin-bottom:0">
      </div>
      <div style="display:flex;gap:8px;margin-bottom:6px">
        <input type="number" id="stokMiktar" class="inp" placeholder="Miktar" min="0" step="1" style="width:90px">
        <select id="stokBirim" class="inp" style="flex:1">
          <option value="g">g</option>
          <option value="kg">kg</option>
          <option value="mL">mL</option>
          <option value="L">L</option>
          <option value="adet">adet</option>
          <option value="paket">paket</option>
          <option value="tablet">tablet</option>
          <option value="parça">parça</option>
          <option value="dal">dal</option>
          <option value="yaprak">yaprak</option>
        </select>
      </div>
      <div style="display:flex;gap:8px;margin-bottom:8px">
        <select id="stokGrup" class="inp" style="flex:1">
          <option value="Hop">🌿 Hop</option><option value="Malt">🌾 Malt</option>
          <option value="Maya">🧬 Maya</option><option value="Şeker">🍬 Şeker</option>
          <option value="Su Minerali">💧 Su Minerali</option><option value="Aroma">🌺 Aroma</option>
          <option value="Meşe">🪵 Meşe</option><option value="Diğer">📦 Diğer</option>
        </select>
        <input type="number" id="stokUyari" class="inp" style="width:90px" placeholder="Uyarı" min="0" step="1">
      </div>
      <button class="btn" style="background:var(--altin);color:#fff;width:100%;padding:10px" onclick="stokEkle()">+ Stoka Ekle</button>
    </div>`;
  const stokAramaKutu=
    '<div style="padding:8px 12px;background:var(--bg2);border-bottom:1px solid var(--bor)">'+
      '<input id="stokAramaInp" type="text" class="inp" style="font-size:13px;margin-bottom:6px" placeholder="🔍 Stokta ara..." value="'+esc(sekmeArama.stok)+'" oninput="_stokAra(this.value)">'+
      (stokGruplari.length>0?'<div style="display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px">'+stokKatBar+'</div>':'')+
    '</div>';
  return'<div class="header" style="display:flex;align-items:center;gap:10px;padding:14px 16px">'+
    '<button class="btn" onclick="stokEkranKapat()" style="background:rgba(255,255,255,.2);color:#FFE090;font-size:22px;padding:2px 8px;border-radius:8px;line-height:1">‹</button>'+
    '<div style="font-size:18px;font-weight:700;color:#FFE090;flex:1">📦 Stok Yönetimi</div>'+
  '</div>'+
  stokAramaKutu+
  '<div style="padding:12px">'+stokEkleForm+'<div id="stokListeDiv">'+stokListesi+'</div></div>';
}

  const nYapimda=KR.filter(t=>t.durum==="yapimda").length;

            '<div style="font-size:9px;color:rgba(240,200,100,.55);letter-spacing:.5px">'+ad+'</div>'+

        ).join("")+
      '</div>'+

        '<div style="border-top:1px solid rgba(255,210,120,.25);padding-top:8px">'+
          '<div style="font-size:9px;color:rgba(255,220,130,.6);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px">⚗️ Yapım Aşamasında</div>'+
          yapimda.slice(0,3).map(t=>{
            const son=t.brewLog[t.brewLog.length-1];
            return'<div onclick="tarifAc(this.dataset.id)" data-id="'+t.id+'" style="display:flex;align-items:center;gap:8px;padding:6px 8px;background:rgba(255,210,120,.07);border-radius:6px;margin-bottom:4px;cursor:pointer">'+
              '<div style="font-size:13px;font-weight:700;color:#F0D88A;flex:1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;font-family:var(--font-display)">'+esc(t.biraAd)+'</div>'+

        '<span style="position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--dim);font-size:13px">🔍</span>'+
        (aramaMetni?'<button onclick="clearArama()" style="position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--dim);font-size:18px;cursor:pointer;line-height:1">×</button>':'')+
      '</div>'+
    '</div>';

    '<div style="display:flex;gap:6px;overflow-x:auto;padding:8px 12px 6px;scrollbar-width:none;background:var(--bg2)">'+
      klasorler.map((k,ki)=>{
        const ak=aktifKlasor===k;
        return'<button onclick="setAktifKlasor('+ki+')" style="flex-shrink:0;padding:4px 12px;border-radius:16px;border:1.5px solid '+(ak?"var(--altin)":"var(--bor)")+';background:'+(ak?"var(--sa)":"var(--card)")+';color:'+(ak?"var(--bakir)":"var(--soluk)")+';font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap">'+(k||"📂 Tümü")+'</button>';
      }).join("")+
    '</div>':
    "";

  // Sekme bar
  const sekmeTanim=[{id:"aktif",et:"📋 Planlananlar"},{id:"yapimda",et:"🧬 Aktif"},{id:"arsiv",et:"📦 Arşiv"},{id:"istek",et:"⭐ İstek"}];
  const sekmeBar=sekmeTanim.map((s,si)=>{

function render(){
  const _sbEl=document.querySelector('.sb');
  const _sbScroll=_sbEl?_sbEl.scrollLeft:0;
  try{
    document.getElementById("ekran").innerHTML=ekran==="liste"?rListe():ekran==="stok"?rStok():rEditor();
  }catch(e){
    console.error('render:',e);
    var _eb=document.getElementById('_errBanner')||document.createElement('div');
    _eb.id='_errBanner';
    _eb.setAttribute('style','position:fixed;top:0;left:0;right:0;background:#c00;color:#fff;padding:10px 12px;z-index:9999;font-size:12px;word-break:break-all');
    _eb.textContent='⚠️ RENDER HATASI: '+e.message+' | stack: '+(e.stack||'').slice(0,120);
    document.body.appendChild(_eb);
    setTimeout(function(){var b=document.getElementById('_errBanner');if(b)b.remove();},8000);
  }
  const _sbNew=document.querySelector('.sb');
  if(_sbNew&&_sbScroll>0) _sbNew.scrollLeft=_sbScroll;
  const e=document.getElementById("ymId");if(e)e.value=yM.id;
  const f=document.getElementById("yhId");if(f)f.value=yH.id;
  const g=document.getElementById("yMinId");if(g)g.value=yMin.id;
  const mk=document.getElementById("moIpucu");if(mk){const m=MALTLAR.find(x=>x.id===yM.id);if(m&&mk)mk.textContent=m.mo||"";}
  const ma=document.getElementById("minAcik");if(ma){const m=MINERALLER.find(x=>x.id===yMin.id);if(m)ma.textContent=m.aciklama||"";}
  // Katkı arama input focus koru
  if(sekme==="katki"){
    requestAnimationFrame(()=>{
      const _a=document.getElementById("katAraInp");
      if(_a){const p=_a.value.length;_a.focus();try{_a.setSelectionRange(p,p);}catch(e){}}
    });
  }

  // Form açıksa seçiciyi güncelle
  setTimeout(function(){
    var f=document.getElementById('logFormIcerik');
    if(f&&f.style.display!=='none'){
      var tipEl=document.getElementById('logTip');
      if(tipEl&&(tipEl.value==='dry_hop'||tipEl.value==='katki')){
        logTipDegisti(tipEl.value);
      }
    }
  },0);
}

// Katkıyı tarife ekle
function katki_ekle_ozel(zaman){
  const el=document.getElementById('ozKatki');
  const birimEl=document.getElementById('ozKatkiBirim');
  const ad=(el?.value||'').trim();
  if(!ad){el&&(el.style.borderColor='#E89090');setTimeout(()=>{el&&(el.style.borderColor='')},1200);return;}
  const birim=birimEl?.value||'g';
  if(!S.katkilar)S.katkilar=[];
  S.katkilar.push({id:'ozel_'+Date.now(),ad,birim,miktar:1,zaman});
  el.value='';
  const toast=document.createElement('div');
  toast.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#5A3000;color:#FFE090;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:600;z-index:999;box-shadow:0 4px 12px rgba(0,0,0,.3)';
  toast.textContent='✓ '+ad+' → '+zaman+' eklenecek';
  document.body.appendChild(toast);setTimeout(()=>toast.remove(),2200);
  render();
}
function katki_ekle_tarif(id){
  const k=KATKILAR.find(x=>x.id===id);
  if(!k)return;
  // Kullanıcının girdiği miktar ve seçtiği birimi oku
  const miktarEl=document.getElementById('km_'+id);
  const birimEl=document.getElementById('kb_'+id);
  const miktar=parseFloat(miktarEl?.value)||1;
  const birim=birimEl?.value||k.birim;
  if(!S.katkilar) S.katkilar=[];
  S.katkilar.push({id:k.id, ad:k.ad, birim, miktar, zaman:k.kullanim});
  const el=document.createElement('div');
  el.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1A4A1A;color:#80FF80;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:600;z-index:999;box-shadow:0 4px 12px rgba(0,0,0,.3)';
  el.textContent='✓ '+k.ad+' — '+miktar+' '+birim+' tarife eklendi';
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),2200);
  render();
}

// Stok seçimini güncelle
function stokSecimGuncelle(val){
  if(!val||val.startsWith('__'))return;
  if(val==='ozel'){document.getElementById('stokAd').value='';return;}
  const parts=val.split('|');
  if(parts.length>=4){
    document.getElementById('stokAd').value=parts[1];
    document.getElementById('stokBirim').value=parts[2];
    document.getElementById('stokGrup').value=parts[3];
  }
}

function stokEkle(){
  const ad=(document.getElementById("stokAd")?.value||"").trim();
  const miktar=parseFloat(document.getElementById("stokMiktar")?.value)||0;
  const birim=document.getElementById("stokBirim")?.value||"g";
  const g=document.getElementById("stokGrup")?.value||"Diğer";
  const uyari=parseFloat(document.getElementById("stokUyari")?.value)||0;
  if(!ad)return;
  STOK.push({id:Date.now().toString(),ad,miktar,birim,g,uyari});
  stokKaydet(STOK);if(ekran==='stok'){document.getElementById('ekran').innerHTML=rStok();}else render();
}
function stokGuncelle(idx, isaret){
  if(idx<0||idx>=STOK.length||!STOK[idx])return;
  // Adımı DOM'dan oku (onchange'i beklemeden anlık değer)
  const el=document.getElementById('adim_'+idx);
  const adim=el?parseFloat(el.value)||1:(STOK[idx].adim||1);

const SYNC_SK = "bm_sync_v1";
let syncCfg = null;
let syncPollTimer = null;
let syncBusy = false;
let syncSonGuncelle = 0;

function syncYukle(){
  try{ syncCfg = JSON.parse(localStorage.getItem(SYNC_SK)||"null"); }
  catch{ syncCfg = null; }
}
function syncKaydet(cfg){
  try{ localStorage.setItem(SYNC_SK, JSON.stringify(cfg)); }
  catch{}
}

function syncUrl(){
  if(!syncCfg||!syncCfg.url||!syncCfg.oda) return null;
  // url: https://proje-xxx-default-rtdb.firebaseio.com
  // path: /brewmaster_<oda>.json
  const base = syncCfg.url.replace(/\/$/, '');
  return base + '/brewmaster_' + syncCfg.oda + '.json';
}

async function syncGonder(){
  const url = syncUrl();
  if(!url) return;
  if(syncBusy) return;
  syncBusy = true;
  try{
    const data = {
      KR: JSON.parse(JSON.stringify(KR)),
      STOK: JSON.parse(JSON.stringify(STOK)),
      ts: Date.now(),
      cihaz: syncCfg.cihaz||"A"
    };
    const res = await fetch(url, {
      method:'PUT',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify(data)
    });
    if(res.ok){
      syncSonGuncelle = Date.now();
      syncDurumGuncelle('ok');
    } else {
      syncDurumGuncelle('hata');
    }
  } catch(e){
    syncDurumGuncelle('hata');
  }
  syncBusy = false;
}

async function syncAl(){
  const url = syncUrl();
  if(!url) return;
  try{
    const res = await fetch(url);
    if(!res.ok) return;
    const data = await res.json();
    if(!data||!data.KR) return;
    // Sadece bizden daha yeni ise uygula
    if(data.ts > syncSonGuncelle && data.cihaz !== (syncCfg.cihaz||"A")){
      KR = data.KR || [];
      STOK = data.STOK || [];
      _origKy(KR);
      _origStokKaydet(STOK);
      syncSonGuncelle = data.ts;
      // Sadece liste ekranındaysa render et — editördeyken formu bozma
      if(ekran==='liste'){render();}
      syncDurumGuncelle('guncel');
    }
  } catch(e){}
}

function syncDinle(){
  // Firebase REST polling — 5 saniyede bir kontrol
  // SSE yerine polling: daha basit, her tarayıcıda çalışır
  if(syncPollTimer){ clearInterval(syncPollTimer); syncPollTimer=null; }
  const url = syncUrl();
  if(!url){ syncDurumGuncelle('kapali'); return; }
  
  // İlk anlık kontrol
  syncAl();
  
  // 5 saniyede bir kontrol et
  syncPollTimer = setInterval(()=>{ syncAl(); }, 5000);
  syncDurumGuncelle('bagli');
}

function syncDurumGuncelle(durum){
  const el = document.getElementById('syncDurum');
  if(!el) return;
  const durumlar = {
    'ok':          ['🟢','Senkron edildi'],
    'guncel':      ['🔵','Güncelleme alındı'],
    'bagli':       ['🟡','Bağlı — 5sn polling'],
    'hata':        ['🔴','Bağlantı hatası'],
    'baglanti-yok':['🔴','Bağlantı kesildi'],
    'kapali':      ['⚫','Senkron kapalı'],
  };
  const [ikon, metin] = durumlar[durum] || ['⚫',''];
  el.textContent = ikon + ' ' + metin;
}

function syncBaslat(){
  syncYukle();
  if(!syncCfg||!syncCfg.url||!syncCfg.oda){
    syncDurumGuncelle('kapali');
    return;
  }
  syncAl();       // İlk yükleme
  syncDinle();    // Gerçek zamanlı dinle
}
